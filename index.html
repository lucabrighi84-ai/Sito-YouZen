<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouZen - Automazione</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 90%;
            position: relative;
            z-index: 10;
        }

        /* Logo di sfondo */
        .background-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            max-width: 450px;
            opacity: 0.08;
            z-index: 1;
            pointer-events: none;
            filter: sepia(1) saturate(5) hue-rotate(-10deg);
        }

        /* Filo */
        .wire {
            position: absolute;
            top: -180px;
            left: 50%;
            transform: translateX(-50%);
            width: 1.5px;
            height: 140px;
            background: linear-gradient(to bottom, #000, #555);
        }

        /* Lampadina con intermittenza accentuata */
        .bulb {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 32px;
            background: #ff9d00;
            border-radius: 50%;
            box-shadow: 0 0 50px 20px rgba(255, 157, 0, 0.7);
            z-index: 3;
            animation: glitch-flicker 3s infinite; /* Più veloce e irregolare */
        }

        h1 {
            font-size: clamp(2.8rem, 12vw, 5rem);
            font-weight: 700;
            letter-spacing: 12px;
            margin: 0;
            text-transform: uppercase;
            animation: text-glitch 3s infinite;
        }

        h2 {
            font-size: clamp(0.9rem, 4.5vw, 1.3rem);
            font-weight: 300;
            letter-spacing: 6px;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        /* ANIMAZIONE INTERMITTENZA ACCENTUATA */
        @keyframes glitch-flicker {
            0%, 10%, 12%, 25%, 27%, 30%, 70%, 72%, 100% { 
                opacity: 1; 
                box-shadow: 0 0 50px 20px rgba(255, 157, 0, 0.7);
                transform: translateX(-50%) scale(1);
            }
            11%, 26%, 29%, 71%, 73% { 
                opacity: 0.1; 
                box-shadow: none;
                transform: translateX(-51%) scale(0.95);
            }
        }

        @keyframes text-glitch {
            0%, 10%, 12%, 25%, 27%, 30%, 70%, 72%, 100% { 
                text-shadow: 0 0 20px rgba(255, 157, 0, 0.6);
                color: #fff;
            }
            11%, 26%, 29%, 71%, 73% { 
                text-shadow: none; 
                color: #333; /* Quasi nero durante l'intermittenza */
            }
        }

        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(255,100,0,0.05) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <img src="logo.webp" alt="YouZen Logo" class="background-logo">

    <div class="container">
        <div class="wire">
            <div class="bulb"></div>
        </div>
        <h1>YouZen</h1>
        <h2>Stiamo Arrivando</h2>
    </div>

</body>
</html>
