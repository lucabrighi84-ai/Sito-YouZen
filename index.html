<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouZen - Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* Il cavo */
        .wire {
            position: absolute;
            top: -250px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 200px;
            background: #222;
        }

        /* La lampadina con animazione sfarfallio */
        .bulb {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 45px;
            background: #fff;
            border-radius: 50%;
            z-index: 2;
            animation: flicker 4s infinite alternate;
        }

        /* Definizione dello sfarfallio */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                box-shadow: 
                    0 0 60px 25px rgba(255, 255, 255, 0.7),
                    0 0 120px 60px rgba(255, 255, 255, 0.2);
                opacity: 1;
            }
            20%, 24%, 55% {
                box-shadow: none;
                opacity: 0.4;
            }
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: 15px;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            /* Il testo reagisce alla luce della lampadina */
            animation: text-flicker 4s infinite alternate;
        }

        @keyframes text-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* Luce soffusa sullo sfondo */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div class="wire">
            <div class="bulb"></div>
        </div>
        <h1>YouZen</h1>
        <p>Automazione Intelligente</p>
    </div>

</body>
</html>
