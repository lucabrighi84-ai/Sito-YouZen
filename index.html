<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouZen - Automazione</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* Il cavo della lampadina */
        .wire {
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 150px;
            background: #333;
        }

        /* La lampadina luminosa */
        .bulb {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 45px;
            background: #fff;
            border-radius: 50%;
            /* Il bagliore che illumina la scritta */
            box-shadow: 
                0 0 60px 25px rgba(255, 255, 255, 0.7),
                0 0 120px 60px rgba(255, 255, 255, 0.2);
            z-index: 2;
        }

        h1 {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 12px;
            margin: 0;
            color: #fff;
            /* Leggero riflesso della luce sul testo */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* Un ulteriore alone di luce ambientale */
        .ambient-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0) 60%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="container">
        <div class="wire">
            <div class="bulb"></div>
        </div>
        <h1>YouZen</h1>
        <p>Automation Solutions</p>
    </div>

</body>
</html>
